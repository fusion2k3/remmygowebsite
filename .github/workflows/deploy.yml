name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git Deploy
        run: |
          curl -s -X POST \
            --user "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository=/home/seowavec/repos/remmygowebsite" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/create"
